<!DOCTYPE html>

<head>

<title>Riju3D | Animation Portfolio</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:white;
}

/* Header */

header{
padding:30px;
font-size:28px;
font-weight:bold;
text-align:center;
background:#111;
color:#4fd1ff;
}

/* Layout */

.container{
display:flex;
}

/* Sidebar */

.sidebar{
width:200px;
background:#0f1720;
padding:20px;
}

.sidebar a{
display:block;
color:#4fd1ff;
text-decoration:none;
margin:10px 0;
}

.sidebar a:hover{
color:white;
}

/* Main */

.main{
flex:1;
padding:30px;
}

/* Section */

.section{
margin-bottom:50px;
}

.section h2{
border-bottom:2px solid #4fd1ff;
padding-bottom:10px;
margin-bottom:20px;
color:#4fd1ff;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* Card */

.card{
background:#111827;
padding:10px;
border-radius:8px;
}

.card img{
width:100%;
border-radius:6px;
}

iframe{
width:100%;
height:200px;
border:none;
}

</style>
